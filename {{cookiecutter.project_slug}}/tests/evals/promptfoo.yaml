description: "{{cookiecutter.project_name}} — prompt evaluation suite"

providers:
  - id: "python:provider.py"
    label: root_agent

prompts:
  - "{% raw %}{{prompt}}{% endraw %}"

# Skill-segmented test suites.
# Each file targets one capability so failures pinpoint the exact regression.
# Add new cases to the relevant datasets/skills/*.jsonl file.
# Run with: make eval
tests:
  - file://datasets/skills/functional.jsonl
  - file://datasets/skills/tool_datetime.jsonl
  - file://datasets/skills/tool_search.jsonl
  - file://datasets/skills/safety_injection.jsonl
  - file://datasets/skills/safety_pii.jsonl

threshold: 0.90
